name: Production CI/CD Engine Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v3

      - name: Setup Python Environment Context
        uses: actions/setup-python@v4
        with:
          python-node: '3.10'

      - name: Install Ingest Backend Dependencies
        run: |
          pip install -r backend-ingest/requirements.txt || true
          pip install flake8
          # Run lint syntax check rules to protect production runtime
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Authenticate Session to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compile and Push Frontend Image Node
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/predictive-frontend:latest

      - name: Compile and Push Backend Ingest Image Node
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend-ingest/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/predictive-backend:latest

  deploy-to-aws-ec2:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: SSH Command Pipeline Execution into AWS EC2 Engine
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ec2-user/realtime-predictive-engine
            
            # Authenticate target machine to download fresh builds
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Pull down fresh built images from registry nodes
            docker compose pull
            
            # Hot reload application containers silently in daemon mode
            docker compose up -d --remove-orphans
            
            # Clear hanging stale memory asset cache nodes
            docker image prune -f

            